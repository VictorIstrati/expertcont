# ============================================================================
# Site data — single source of truth for contact info + pricing.
#
# Editable by marketing without touching code. Validated by Zod at build time
# (see apps/web/src/site/index.ts); a malformed file fails `pnpm build` with
# a precise error pointing at the bad field.
#
# Localized fields use { ro, ru, en }; all three are required.
# Invariant fields (phone, email, numeric prices) are plain values.
# ============================================================================

business:
  # Single canonical phone number. Used in footer, contact pages, service pages,
  # home CTA, and tel: links. Format with spaces for display.
  phone: "+373 22 22 33 44"
  email: contact@expertcont.md
  # Postal address as structured parts. Helpers in site/index.ts compose them into
  # short ("street, city") or full ("street, city, postalCode, country") strings.
  # JSON-LD in Base.astro reads street/city/postalCode/countryCode directly.
  address:
    street:
      ro: "Str. Mitropolit Varlaam 65"
      ru: "ул. Митрополит Варлаам 65"
      en: "65 Mitropolit Varlaam St."
    city:
      ro: "Chișinău"
      ru: "Кишинёв"
      en: "Chișinău"
    postalCode: "MD-2012"
    countryCode: "MD"          # ISO 3166-1 alpha-2
    countryName:
      ro: "Republica Moldova"
      ru: "Республика Молдова"
      en: "Republic of Moldova"
  hours:
    ro: "Luni–Vineri, 9:00–18:00"
    ru: "Понедельник–пятница, 9:00–18:00"
    en: "Monday–Friday, 9:00–18:00"

pricing:
