    calcDocs:         { ro: "Volum documente / lună",         ru: "Объём документов / месяц",       en: "Document volume / month" }
    calcEmployees:    { ro: "Angajați (payroll)",             ru: "Сотрудники (payroll)",           en: "Employees (payroll)" }
    calcVat:          { ro: "Plătitor TVA",                   ru: "Плательщик НДС",                 en: "VAT registered" }
    calcServices:     { ro: "Servicii adiționale",            ru: "Дополнительные услуги",          en: "Additional services" }
