# ============================================================================
# Site data — single source of truth for contact info + pricing.
#
# Editable by marketing without touching code. Validated by Zod at build time
# (see apps/web/src/site/index.ts); a malformed file fails `pnpm build` with
# a precise error pointing at the bad field.
#
# Localized fields use { ro, ru, en }; all three are required.
# Invariant fields (phone, email, numeric prices) are plain values.
# ============================================================================

business:
  # Brand name — used everywhere: JSON-LD name, footer copyright, legal text.
  name: "ExpertCont"
  # ISO year of incorporation — surfaces as schema.org/foundingDate.
  foundingDate: "2022"
  # Headcount band for JSON-LD numberOfEmployees (QuantitativeValue).
  employees:
    min: 5
    max: 10
  # Tagline — used in JSON-LD slogan + free-text where helpful.
  slogan: "Experiență · Eficiență · Rezultate"
  # Single canonical phone number. Used in footer, contact pages, service pages,
  # home CTA, and tel: links. Format with spaces for display.
  phone: "+373 60 82 55 81"
  email: info@expertcont.md
  # Telegram username without the leading @. Used for t.me/<handle> links.
  telegram: "expertcont_md"
  # Social profile URLs. Used for schema.org sameAs (Knowledge Panel signal).
  # Leave any field empty ("") to omit it from the structured data.
  socials:
    facebook: "https://www.facebook.com/expertcont.md"
    linkedin: "https://www.linkedin.com/company/expertcont"
    instagram: "https://www.instagram.com/expertcont.md"
  # Postal address as structured parts. Helpers in site/index.ts compose them into
  # short ("street, city") or full ("street, city, postalCode, country") strings.
  # JSON-LD in Base.astro reads street/city/postalCode/countryCode directly.
  address:
    street:
      ro: "str. Alexandru cel Bun 51/A"
      ru: "ул. Александру чел Бун 51/А"
      en: "51/A Alexandru cel Bun St."
    city:
      ro: "Chișinău"
      ru: "Кишинёв"
      en: "Chișinău"
    postalCode: "MD-2012"
    countryCode: "MD"          # ISO 3166-1 alpha-2
    countryName:
      ro: "Republica Moldova"
      ru: "Республика Молдова"
      en: "Republic of Moldova"
  hours:
    ro: "Luni–Vineri, 9:00–18:00"
    ru: "Понедельник–пятница, 9:00–18:00"
    en: "Monday–Friday, 9:00–18:00"

pricing:
  eyebrow:    { ro: "PREȚURI",              ru: "ТАРИФЫ",             en: "PRICING" }
  title:
    ro: "Prețuri contabilitate — pachete clare pentru companii din Moldova"
    ru: "Цены на бухгалтерские услуги — понятные пакеты для компаний в Молдове"
    en: "Accounting prices — clear packages for companies in Moldova"
  subtitle:
    ro: "Tarife transparente, fără costuri ascunse. Alegeți pachetul potrivit pentru afacerea dvs. sau folosiți calculatorul pentru o estimare personalizată."
    ru: "Прозрачные тарифы без скрытых платежей. Выберите подходящий пакет или воспользуйтесь калькулятором для индивидуальной оценки."
    en: "Transparent rates, no hidden costs. Choose the right plan for your business or use the calculator for a personalised estimate."

  # Intro section rendered above the tier grid. Three short paragraphs that
  # capture the long-tail "how much does accounting cost" intent and help
  # prospects self-qualify before scanning tier prices.
  intro:
    eyebrow:
      ro: "GHID DE PREȚ"
      ru: "ГИД ПО ЦЕНАМ"
      en: "PRICING GUIDE"
    title:
      ro: "Cât costă contabilitatea pentru afacerea ta?"
      ru: "Сколько стоит бухгалтерия для вашего бизнеса?"
      en: "How much does accounting cost for your business?"
    paragraphs:
      - heading:
          ro: "Ce influențează prețul"
          ru: "Что влияет на цену"
          en: "What drives the price"
        body:
          ro: "Costul lunar al unui contabil în Moldova depinde de patru factori principali: cifra de afaceri anuală, numărul de angajați, volumul lunar de facturi și industria în care activezi. O afacere de servicii cu cifră sub 500.000 lei și un angajat are nevoi diferite față de un magazin online cu 2.000.000 lei și echipă de cinci."
          ru: "Ежемесячная стоимость бухгалтера в Молдове зависит от четырёх главных факторов: годовой оборот, число сотрудников, объём счетов-фактур в месяц и отрасль. Услуговый бизнес с оборотом до 500 000 леев и одним сотрудником имеет иные потребности, чем интернет-магазин с 2 000 000 леев и командой из пяти человек."
          en: "The monthly cost of an accountant in Moldova depends on four main factors: annual revenue, headcount, monthly invoice volume, and your industry. A services business with under 500,000 MDL turnover and one employee has different needs than an online shop with 2,000,000 MDL and a team of five."
      - heading:
          ro: "Cum se mapează cele trei pachete"
          ru: "Как сопоставлены три пакета"
          en: "How the three packages map"
        body:
          ro: "Pachetul Start acoperă SRL nou-create și micro-afacerile cu volum redus. Standard este cel mai ales — pentru SRL în creștere cu o echipă mică și activitate B2B regulată. Premium e gândit pentru afaceri mature cu cerințe extinse, industrii complexe sau echipă completă. Toate trei includ HR și consultanță juridică în-house."
          ru: "Пакет Start подходит для новых ООО и микро-бизнеса с низким объёмом. Standard — самый популярный для растущих ООО с небольшой командой и регулярной B2B-активностью. Premium создан для зрелого бизнеса с расширенными требованиями, сложными отраслями или полной командой. Все три включают HR и юридическую консультацию в-хауз."
          en: "The Start plan covers new LLCs and micro-businesses with low volume. Standard is the most popular — for growing LLCs with a small team and regular B2B activity. Premium is built for mature businesses with extended requirements, complex industries, or a full team. All three include HR and in-house legal consulting."
      - heading:
          ro: "Când să folosești calculatorul"
          ru: "Когда использовать калькулятор"
          en: "When to use the calculator"
        body:
          ro: "Dacă afacerea ta nu se încadrează exact într-un pachet — de exemplu, vrei doar consultanță juridică fără contabilitate, sau ai un volum atipic de facturi — folosește calculatorul de mai jos pentru o estimare personalizată în câteva secunde."
          ru: "Если ваш бизнес не попадает чётко в один из пакетов — например, нужна только юридическая консультация без бухгалтерии, или у вас нетипичный объём счетов — воспользуйтесь калькулятором ниже для индивидуальной оценки за несколько секунд."
          en: "If your business doesn't fit a package exactly — for example, you only need legal consulting without bookkeeping, or you have an unusual invoice volume — use the calculator below for a personalised estimate in seconds."
  labelMonthly: { ro: "Lunar",  ru: "Ежемесячно", en: "Monthly" }
  labelYearly:  { ro: "Anual",  ru: "Ежегодно",   en: "Annually" }

  # Modular calculator copy. Numeric pricing lives in pricing.yml; this block
  # only contains UI strings (headings, toggle labels, breakdown labels).
  # Each `services.<key>` matches a togglable card in <PriceCalculator/>.
  calculator:
    eyebrow:   { ro: "Calculator de prețuri",                        ru: "Калькулятор цен",                            en: "Price calculator" }
    heading:   { ro: "Estimează costul lunar pentru afacerea ta",   ru: "Оцените ежемесячную стоимость для вашего бизнеса", en: "Estimate the monthly cost for your business" }
    subtitle:
      ro: "Activează doar serviciile de care ai nevoie. Poți calcula un singur serviciu (de ex. 10 ore juridice) sau un pachet complet — total recalculat în timp real."
      ru: "Включите только нужные услуги. Можно посчитать одну услугу (например, 10ч юриста) или полный пакет — итог пересчитывается мгновенно."
      en: "Toggle only the services you need. Calculate a single service (e.g. 10 legal hours) or a complete bundle — total updates instantly."

    services:
      accounting:
        label:         { ro: "Contabilitate",            ru: "Бухгалтерия",                 en: "Accounting" }
        description:   { ro: "Tarif pornind de la baza industriei + facturi peste prag + multiplicator după cifra de afaceri.", ru: "Базовый тариф по отрасли + надбавка за счета-фактуры свыше порога + множитель по обороту.", en: "Industry base + invoices above threshold + revenue multiplier." }
        industryLabel: { ro: "Domeniu de activitate",   ru: "Отрасль / тип компании",      en: "Industry / business type" }
        invoicesLabel: { ro: "Facturi emise / lună",     ru: "Счетов-фактур / месяц",       en: "Invoices issued / month" }
        revenueLabel:  { ro: "Cifră de afaceri anuală (MDL)", ru: "Годовой оборот (MDL)",   en: "Annual revenue (MDL)" }
        vatLabel:      { ro: "Plătitor TVA",             ru: "Плательщик НДС",              en: "VAT-registered" }
        baseFromLabel: { ro: "Tarif de la",              ru: "Тариф от",                    en: "Starting at" }
        surchargeNote: { ro: "{count} facturi peste pragul de {free} × {rate} MDL", ru: "{count} счетов-фактур сверх лимита {free} × {rate} MDL", en: "{count} invoices above the {free} threshold × {rate} MDL" }
        multiplierNote: { ro: "× {factor} pentru cifra de afaceri în această bandă", ru: "× {factor} для оборота в этой группе", en: "× {factor} for revenue in this band" }

      legal:
        label:        { ro: "Servicii juridice",         ru: "Юридические услуги",          en: "Legal services" }
        description:  { ro: "Consultanță juridică, redactare contracte, reprezentare.", ru: "Юр. консультация, договоры, представительство.", en: "Legal consultation, contract drafting, representation." }
        hoursLabel:   { ro: "Ore juridice / lună",       ru: "Юр. часов / месяц",           en: "Legal hours / month" }
        rateNote:     { ro: "{rate} MDL / oră",          ru: "{rate} MDL / час",            en: "{rate} MDL / hour" }

      financial:
        label:        { ro: "Audit financiar",           ru: "Финансовый аудит",            en: "Financial audit" }
        description:  { ro: "Verificarea înregistrărilor contabile și raportare independentă.", ru: "Проверка бухгалтерских записей и независимая отчётность.", en: "Verification of accounting records and independent reporting." }
        hoursLabel:   { ro: "Ore audit / lună",          ru: "Часов аудита / месяц",        en: "Audit hours / month" }
        rateNote:     { ro: "{rate} MDL / oră",          ru: "{rate} MDL / час",            en: "{rate} MDL / hour" }

      it:
        label:        { ro: "Servicii IT",               ru: "IT-услуги",                   en: "IT services" }
        description:  { ro: "Implementare ERP, automatizări, integrări, suport tehnic.", ru: "Внедрение ERP, автоматизации, интеграции, техподдержка.", en: "ERP setup, automation, integrations, tech support." }
        hoursLabel:   { ro: "Ore IT / lună",             ru: "IT-часов / месяц",            en: "IT hours / month" }
        rateNote:     { ro: "{rate} MDL / oră",          ru: "{rate} MDL / час",            en: "{rate} MDL / hour" }

      hr:
        label:           { ro: "Servicii HR",            ru: "HR-услуги",                   en: "HR services" }
        description:     { ro: "Contracte de muncă, fișe de post, evidență personal — tarif lunar per angajat acoperit.", ru: "Трудовые договоры, должностные инструкции, кадровый учёт — ежемесячный тариф за каждого сотрудника.", en: "Employment contracts, job descriptions, personnel records — monthly fee per covered employee." }
        employeesLabel:  { ro: "Angajați acoperiți",     ru: "Сотрудников под управлением", en: "Employees covered" }
        rateNote:        { ro: "{rate} MDL / angajat / lună", ru: "{rate} MDL / сотрудник / месяц", en: "{rate} MDL / employee / month" }

    result:
      heading:        { ro: "Estimare lunară",           ru: "Ежемесячная оценка",          en: "Monthly estimate" }
      perMonth:       { ro: "MDL / lună",                ru: "MDL / мес",                   en: "MDL / month" }
      annualLabel:    { ro: "≈ {amount} MDL / an",       ru: "≈ {amount} MDL / год",        en: "≈ {amount} MDL / year" }
      breakdownTitle: { ro: "Detaliere",                 ru: "Детализация",                 en: "Breakdown" }
      emptyState:
        ro: "Activează cel puțin un serviciu pentru a vedea estimarea."
        ru: "Включите хотя бы одну услугу, чтобы увидеть оценку."
        en: "Toggle at least one service to see the estimate."
      disclaimer:
        ro: "Estimare orientativă, fără TVA. Oferta finală după consultația gratuită."
        ru: "Ориентировочная оценка, без НДС. Окончательное предложение — после бесплатной консультации."
        en: "Indicative estimate, VAT excluded. Final offer after the free consultation."
      cta:            { ro: "Vreau oferta",                  ru: "Хочу предложение",                       en: "I want the offer" }

  # Pricing anchored to the Moldovan market (competitor mid-points + 30% margin).
  # Three tiers, by company complexity. EVERY tier bundles HR + Legal in-house
  # so the client doesn't have to source those separately.
  #   Start    — dormant / holding companies, very low compliance load
  #   Standard — active SMB doing regular B2B (most customers land here)
  #   Premium  — complex industries: construction, transport, distribution,
  #              eCommerce, NGO, manufacturing
  # Prominent estimate disclaimer rendered as a callout ABOVE the tier cards.
  # All three tiers are anchored on Moldovan market mid-points (e.g.
  # intelcont.md). Real quotes depend on document volume, headcount, and
  # industry — flagged explicitly so prospects don't anchor on the "from" price.
  estimateNotice:
    ro: "* Prețurile afișate sunt estimative. Oferta finală depinde de specificul afacerii — volumul de documente, numărul de angajați și industria. Pentru o estimare personalizată, folosește calculatorul de mai jos sau programează o consultație gratuită."
    ru: "* Указанные цены являются оценочными. Окончательная стоимость зависит от специфики бизнеса — объёма документов, числа сотрудников и отрасли. Для индивидуальной оценки воспользуйтесь калькулятором ниже или запишитесь на бесплатную консультацию."
    en: "* Prices shown are estimates. The final quote depends on your business specifics — document volume, headcount, and industry. For a personalised estimate, use the calculator below or book a free consultation."

  tiers:
    - id: start
      price: 2499
      name:   { ro: Start, ru: Start, en: Start }
      period: { ro: " / lună",  ru: " / мес",  en: " / month" }
      desc:
        ro: "Pentru micro-afaceri cu volum redus de operațiuni"
        ru: "Для микро-бизнеса с низким объёмом операций"
        en: "For micro-businesses with low operation volume"
      features:
        - { ro: "Cifră de afaceri: până la 500.000 MDL / an",     ru: "Оборот: до 500 000 MDL / год",                  en: "Turnover: up to 500,000 MDL / year" }
        - { ro: "Calcul salarii pentru 1 angajat",                ru: "Расчёт зарплат для 1 сотрудника",                en: "Payroll for 1 employee" }
        - { ro: "HR: gestiune personal pentru 1 persoană",        ru: "HR: кадровый учёт на 1 человека",               en: "HR: personnel records for 1 person" }
        - { ro: "Până la 3 facturi / lună",                       ru: "До 3 счетов-фактур / месяц",                    en: "Up to 3 invoices / month" }
        - { ro: "Toate declarațiile fiscale (TVA, impozite)",     ru: "Все налоговые декларации (НДС, налоги)",        en: "All tax declarations (VAT, taxes)" }
        - { ro: "1h consultanță juridică / lună",                 ru: "1ч юридической консультации / месяц",           en: "1h legal consultation / month" }
        - { ro: "Bilanț anual inclus",                            ru: "Годовой баланс включён",                        en: "Annual balance sheet included" }
        - { ro: "Răspuns garantat în < 8h în zile lucrătoare",    ru: "Гарантированный ответ < 8ч в рабочие дни",      en: "Guaranteed reply < 8h on business days" }
        - { ro: "Suport pe email",                                ru: "Email-поддержка",                               en: "Email support" }
      cta: { ro: "Alege Start", ru: "Выбрать Start", en: "Choose Start" }

    - id: standard
      price: 2999
      popular: true
      name:   { ro: Standard, ru: Standard, en: Standard }
      period: { ro: " / lună",  ru: " / мес",  en: " / month" }
      desc:
        ro: "Cel mai popular — pentru afaceri în creștere cu echipă mică"
        ru: "Самый популярный — для растущего бизнеса с небольшой командой"
        en: "Most popular — for growing businesses with a small team"
      features:
        - { ro: "Cifră de afaceri: până la 1.500.000 MDL / an",                 ru: "Оборот: до 1 500 000 MDL / год",                                     en: "Turnover: up to 1,500,000 MDL / year" }
        - { ro: "Calcul salarii pentru până la 3 angajați",                     ru: "Расчёт зарплат до 3 сотрудников",                                    en: "Payroll for up to 3 employees" }
        - { ro: "HR: gestiune personal pentru până la 5 persoane (acoperă fluctuația de personal)", ru: "HR: кадровый учёт до 5 человек (с запасом на ротацию)",                              en: "HR: personnel records for up to 5 people (covers turnover)" }
        - { ro: "Până la 5 facturi / lună",                                     ru: "До 5 счетов-фактур / месяц",                                          en: "Up to 5 invoices / month" }
        - { ro: "Toate declarațiile fiscale + raportare CNAS / CNAM",           ru: "Все налоговые декларации + отчётность CNAS / CNAM",                  en: "All tax declarations + CNAS / CNAM reporting" }
        - { ro: "3h consultanță juridică / lună + revizuire contracte",         ru: "3ч юр. консультаций / месяц + ревизия договоров",                    en: "3h legal consultation / month + contract review" }
        - { ro: "Manager de cont dedicat",                                      ru: "Персональный менеджер",                                              en: "Dedicated account manager" }
        - { ro: "Suport pe telefon și email",                                   ru: "Поддержка по телефону и email",                                      en: "Phone and email support" }
        - { ro: "Răspuns garantat în < 4h în zile lucrătoare",                  ru: "Гарантированный ответ < 4ч в рабочие дни",                           en: "Guaranteed reply < 4h on business days" }
        - { ro: "Bilanț anual inclus",                                          ru: "Годовой баланс включён",                                             en: "Annual balance sheet included" }
      cta: { ro: "Alege Standard", ru: "Выбрать Standard", en: "Choose Standard" }

    - id: premium
      price: 3999
      name:   { ro: Premium, ru: Premium, en: Premium }
      period: { ro: " / lună",  ru: " / мес",  en: " / month" }
      desc:
        ro: "Pentru afaceri mature cu echipă completă și cerințe extinse"
        ru: "Для зрелого бизнеса с полной командой и расширенными требованиями"
        en: "For mature businesses with a full team and extended requirements"
      features:
        - { ro: "Cifră de afaceri: până la 2.500.000 MDL / an",                 ru: "Оборот: до 2 500 000 MDL / год",                                     en: "Turnover: up to 2,500,000 MDL / year" }
        - { ro: "Calcul salarii pentru până la 5 angajați",                     ru: "Расчёт зарплат до 5 сотрудников",                                    en: "Payroll for up to 5 employees" }
        - { ro: "HR: gestiune personal pentru până la 10 persoane (acoperă fluctuația de personal)", ru: "HR: кадровый учёт до 10 человек (с запасом на ротацию)",                            en: "HR: personnel records for up to 10 people (covers turnover)" }
        - { ro: "Până la 7 facturi / lună",                                     ru: "До 7 счетов-фактур / месяц",                                         en: "Up to 7 invoices / month" }
        - { ro: "7h consultanță juridică / lună + redactare contracte",         ru: "7ч юр. консультаций / месяц + составление договоров",                en: "7h legal consultation / month + contract drafting" }
        - { ro: "Suport pe telefon și email",                                   ru: "Поддержка по телефону и email",                                      en: "Phone and email support" }
        - { ro: "Răspuns prioritar în < 2h în zile lucrătoare",                 ru: "Приоритетный ответ < 2ч в рабочие дни",                              en: "Priority reply < 2h on business days" }
        - { ro: "Asistență completă la inspecții fiscale și controale",         ru: "Полное сопровождение налоговых проверок и контролей",                en: "Full support during tax inspections and audits" }
      cta: { ro: "Alege Premium", ru: "Выбрать Premium", en: "Choose Premium" }

  # Rate card — mirrors what the calculator above actually charges, so prospects
  # who just want to scan rates can do so without interacting with the calculator.
  # Edit pricing.yml to change rates; keep these strings in sync.
  addOnsTitle:
    ro: "Tarife pentru servicii suplimentare"
    ru: "Тарифы на дополнительные услуги"
    en: "Add-on service rates"
  addOns:
    - name:  { ro: "Consultanță juridică",        ru: "Юридическая консультация",  en: "Legal consultation" }
      price: "500 MDL / h"
    - name:  { ro: "Audit financiar",             ru: "Финансовый аудит",          en: "Financial audit" }
      price: "750 MDL / h"
    - name:  { ro: "Servicii IT",                 ru: "IT-услуги",                 en: "IT services" }
      price: "1500 MDL / h"
    - name:  { ro: "Servicii HR per angajat",     ru: "HR-услуги за сотрудника",   en: "HR services per employee" }
      price: "400 MDL / lună"
    - name:  { ro: "Declarații TVA suplimentare", ru: "Дополнительные декларации НДС", en: "Additional VAT declarations" }
      price: "+200 MDL"
    - name:  { ro: "Bilanț anual standalone",     ru: "Годовой баланс отдельно",   en: "Annual balance sheet standalone" }
      price: "+800 MDL"

  faq:
    - q:
        ro: "Pot schimba pachetul lunar?"
        ru: "Можно ли сменить пакет ежемесячно?"
        en: "Can I change plans monthly?"
      a:
        ro: "Da, poți face upgrade sau downgrade oricând cu preaviz de 7 zile. Modificarea intră în vigoare de la prima zi a lunii următoare."
        ru: "Да, можно перейти на более высокий или низкий тариф с уведомлением за 7 дней. Изменение вступает в силу с первого числа следующего месяца."
        en: "Yes, you can upgrade or downgrade with 7 days notice. The change takes effect from the first day of the following month."
    - q:
        ro: "Ce se întâmplă dacă depășesc volumul de documente?"
        ru: "Что происходит при превышении лимита документов?"
        en: "What happens if I exceed my document volume?"
      a:
        ro: "Documentele suplimentare se facturează la tariful de 15 MDL/document. Te notificăm automat când ajungi la 80% din limită."
        ru: "Дополнительные документы оплачиваются по 15 MDL/документ. Мы автоматически уведомляем вас при достижении 80% лимита."
        en: "Additional documents are billed at 15 MDL/document. We automatically notify you when you reach 80% of your limit."
    - q:
        ro: "Sunt facturate retroactiv serviciile suplimentare?"
        ru: "Выставляются ли счета за дополнительные услуги ретроактивно?"
        en: "Are additional services billed retroactively?"
      a:
        ro: "Nu. Orice serviciu adițional este agreat în prealabil și apare separat în factură la finalul lunii."
        ru: "Нет. Любая дополнительная услуга согласовывается заранее и выставляется отдельной строкой в конце месяца."
        en: "No. Any additional service is agreed in advance and appears as a separate line on your invoice at the end of the month."
    - q:
        ro: "Prețurile includ TVA?"
        ru: "Цены включают НДС?"
        en: "Do prices include VAT?"
      a:
        ro: "Nu. Toate prețurile afișate sunt fără TVA. TVA-ul de 20% se aplică conform legislației în vigoare."
        ru: "Нет. Все указанные цены без НДС. НДС 20% начисляется в соответствии с действующим законодательством."
        en: "No. All displayed prices are exclusive of VAT. 20% VAT applies in accordance with current legislation."
    - q:
        ro: "Pot anula contractul oricând?"
        ru: "Можно ли отменить договор в любое время?"
        en: "Can I cancel at any time?"
      a:
        ro: "Da, cu preaviz de 30 de zile. Nu există penalități sau taxe de ieșire."
        ru: "Да, с уведомлением за 30 дней. Штрафов и выходных комиссий нет."
        en: "Yes, with 30 days notice. There are no penalties or exit fees."
    - q:
        ro: "Există perioadă de probă?"
        ru: "Есть ли пробный период?"
        en: "Is there a trial period?"
      a:
        ro: "Prima consultație de 30 minute este gratuită. Primele 30 de zile au garanție de rambursare integrală dacă nu ești mulțumit."
        ru: "Первая 30-минутная консультация бесплатна. В течение первых 30 дней действует полная гарантия возврата средств."
        en: "The first 30-minute consultation is free. The first 30 days come with a full money-back guarantee if you are not satisfied."
    - q:
        ro: "Cât plătesc în plus față de pachet?"
        ru: "Сколько я доплачиваю сверх пакета?"
        en: "How much do I pay on top of the package?"
      a:
        ro: "Doar pentru servicii care depășesc limitele pachetului ales: ore juridice peste cele incluse (500 MDL/h), ore de audit (750 MDL/h), ore IT (1500 MDL/h), HR per angajat suplimentar (400 MDL/lună) sau documente peste limita lunară (15 MDL/document). Totul este acord în prealabil — nu există surprize pe factură."
        ru: "Только за услуги, превышающие лимиты выбранного пакета: дополнительные юридические часы (500 MDL/ч), часы аудита (750 MDL/ч), IT-часы (1500 MDL/ч), HR за каждого сверхштатного сотрудника (400 MDL/мес) или документы сверх месячного лимита (15 MDL/документ). Всё согласовывается заранее — никаких сюрпризов в счёте."
        en: "Only for services that exceed your package limits: legal hours beyond what's included (500 MDL/h), audit hours (750 MDL/h), IT hours (1500 MDL/h), HR per additional employee (400 MDL/month), or documents above the monthly limit (15 MDL/document). Everything is agreed in advance — no invoice surprises."
    - q:
        ro: "Ce NU este inclus în prețul pachetului?"
        ru: "Что НЕ входит в стоимость пакета?"
        en: "What is NOT included in the package price?"
      a:
        ro: "Audit financiar extern (se cotează separat per misiune), reprezentare în instanță (tarif orar pentru avocat senior), proceduri speciale (lichidare, fuziune, divizare, restructurare), traduceri autorizate, implementări ERP/CRM majore. Pentru orice nevoie atipică oferim ofertă personalizată după consultația gratuită."
        ru: "Внешний финансовый аудит (квотируется отдельно за проект), представительство в суде (почасовая ставка старшего адвоката), специальные процедуры (ликвидация, слияние, разделение, реструктуризация), нотариальные переводы, крупные внедрения ERP/CRM. По любым нестандартным запросам — индивидуальное предложение после бесплатной консультации."
        en: "External financial audit (quoted separately per engagement), court representation (senior lawyer hourly rate), special procedures (liquidation, merger, demerger, restructuring), certified translations, major ERP/CRM implementations. For any atypical need we provide a custom quote after the free consultation."

