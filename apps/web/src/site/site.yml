  faq:
    - q:
        ro: "Pot schimba pachetul lunar?"
        ru: "Можно ли сменить пакет ежемесячно?"
        en: "Can I change plans monthly?"
      a:
        ro: "Da, poți face upgrade sau downgrade oricând cu preaviz de 7 zile. Modificarea intră în vigoare de la prima zi a lunii următoare."
        ru: "Да, можно перейти на более высокий или низкий тариф с уведомлением за 7 дней. Изменение вступает в силу с первого числа следующего месяца."
        en: "Yes, you can upgrade or downgrade with 7 days notice. The change takes effect from the first day of the following month."
    - q:
        ro: "Ce se întâmplă dacă depășesc volumul de documente?"
        ru: "Что происходит при превышении лимита документов?"
        en: "What happens if I exceed my document volume?"
      a:
        ro: "Documentele suplimentare se facturează la tariful de 15 MDL/document. Te notificăm automat când ajungi la 80% din limită."
        ru: "Дополнительные документы оплачиваются по 15 MDL/документ. Мы автоматически уведомляем вас при достижении 80% лимита."
        en: "Additional documents are billed at 15 MDL/document. We automatically notify you when you reach 80% of your limit."
    - q:
        ro: "Sunt facturate retroactiv serviciile suplimentare?"
        ru: "Выставляются ли счета за дополнительные услуги ретроактивно?"
        en: "Are additional services billed retroactively?"
      a:
        ro: "Nu. Orice serviciu adițional este agreat în prealabil și apare separat în factură la finalul lunii."
        ru: "Нет. Любая дополнительная услуга согласовывается заранее и выставляется отдельной строкой в конце месяца."
        en: "No. Any additional service is agreed in advance and appears as a separate line on your invoice at the end of the month."
    - q:
        ro: "Prețurile includ TVA?"
        ru: "Цены включают НДС?"
        en: "Do prices include VAT?"
      a:
        ro: "Nu. Toate prețurile afișate sunt fără TVA. TVA-ul de 20% se aplică conform legislației în vigoare."
        ru: "Нет. Все указанные цены без НДС. НДС 20% начисляется в соответствии с действующим законодательством."
        en: "No. All displayed prices are exclusive of VAT. 20% VAT applies in accordance with current legislation."
    - q:
        ro: "Pot anula contractul oricând?"
        ru: "Можно ли отменить договор в любое время?"
        en: "Can I cancel at any time?"
      a:
        ro: "Da, cu preaviz de 30 de zile. Nu există penalități sau taxe de ieșire."
        ru: "Да, с уведомлением за 30 дней. Штрафов и выходных комиссий нет."
        en: "Yes, with 30 days notice. There are no penalties or exit fees."
    - q:
        ro: "Există perioadă de probă?"
        ru: "Есть ли пробный период?"
        en: "Is there a trial period?"
      a:
        ro: "Prima consultație de 30 minute este gratuită. Primele 30 de zile au garanție de rambursare integrală dacă nu ești mulțumit."
        ru: "Первая 30-минутная консультация бесплатна. В течение первых 30 дней действует полная гарантия возврата средств."
        en: "The first 30-minute consultation is free. The first 30 days come with a full money-back guarantee if you are not satisfied."

  # CTA band rendered below the tier grid. Reframed for the "custom" path:
  # if none of the three packages fit, we send the user to the calculator
  # (#calculator anchor on the same page). The button uses ctaHref to render
  # as a link rather than opening the booking modal.
  ctaTitle:
    ro: "Nu îți găsești pachetul potrivit?"
    ru: "Не нашли подходящий пакет?"
    en: "Can't find the right package?"
  ctaSubtitle:
    ro: "Folosește calculatorul de mai jos pentru o estimare personalizată în câteva secunde — sau contactează-ne pentru o ofertă pe măsura afacerii tale."
    ru: "Воспользуйтесь калькулятором ниже для индивидуальной оценки за несколько секунд — или свяжитесь с нами для предложения под ваш бизнес."
    en: "Use the calculator below for a personalised estimate in seconds — or contact us for an offer tailored to your business."
  ctaButton:
    ro: "Deschide calculatorul"
    ru: "Открыть калькулятор"
    en: "Open the calculator"
  ctaHref: "#calculator"
  notesLine:
    ro: "* Toate prețurile sunt „de la”, fără TVA. Plată lunară, trimestrială sau anuală."
    ru: "* Все цены указаны «от», без НДС. Оплата ежемесячно, ежеквартально или ежегодно."
    en: "* All prices are starting at, VAT excluded. Payment monthly, quarterly or annually."
