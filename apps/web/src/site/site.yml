  title:      { ro: "Pachete transparente", ru: "Прозрачные пакеты",  en: "Transparent packages" }
  subtitle:
    ro: "Prețuri clare, fără surprize. Alegeți pachetul potrivit pentru afacerea dvs. și scalați oricând."
