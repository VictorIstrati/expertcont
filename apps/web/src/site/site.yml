    calcHeading:      { ro: "Spune-ne despre afacerea ta",    ru: "Расскажите нам о вашем бизнесе", en: "Tell us about your business" }
    calcSubtitle:
      ro: "Estimare instantanee pe baza nevoilor afacerii tale."
      ru: "Мгновенная оценка на основе потребностей вашего бизнеса."
      en: "Instant estimate based on your business needs."
    calcLegalForm:    { ro: "Forma juridică",                 ru: "Организационно-правовая форма",  en: "Legal form" }
    calcLegalOpts:
      ro: ["Persoană fizică / II", "SRL", "SA"]
      ru: ["Физлицо / ИП", "ООО", "АО"]
