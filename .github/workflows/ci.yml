name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment: ${{ github.event_name == 'release' && 'production' || '' }}
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile Lingui catalogs
        run: pnpm compile

      - name: Lingui extract — fail on diff
        run: pnpm run extract:check

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (secrets injected from Doppler prd)
        run: doppler run --project expertcont --config prd -- pnpm build

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'release'
        run: |
          doppler run --project expertcont --config prd -- \
            npx wrangler@3 pages deploy apps/web/dist \
              --project-name=expertcont \
              --branch=main

      - name: Set up Supabase CLI
        if: github.event_name == 'release'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply database migrations
        if: github.event_name == 'release'
        run: |
          doppler run --project expertcont --config prd -- bash -c '
            set -euo pipefail
            supabase link --project-ref "$SUPABASE_PROJECT_REF"
            supabase db push --include-all
          '

      - name: Sync Edge Function runtime secrets (Doppler → Supabase)
        if: github.event_name == 'release'
        run: |
          doppler run --project expertcont --config prd -- bash -c '
            set -euo pipefail
            supabase secrets set --project-ref "$SUPABASE_PROJECT_REF" \
              "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" \
              "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" \
              ${ALLOWED_ORIGINS:+ALLOWED_ORIGINS="$ALLOWED_ORIGINS"}
          '

      - name: Deploy Supabase Edge Functions
        if: github.event_name == 'release'
        run: |
          doppler run --project expertcont --config prd -- bash -c '
            set -euo pipefail
            supabase functions deploy \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
          '
