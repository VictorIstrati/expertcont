name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || '' }}
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile Lingui catalogs
        run: pnpm compile

      - name: Lingui extract — fail on diff
        run: pnpm run extract:check

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (secrets injected from Doppler prd)
        run: doppler run --project expertcont --config prd -- pnpm build

      - name: Deploy to Cloudflare Pages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          doppler run --project expertcont --config prd -- \
            npx wrangler@3 pages deploy apps/web/dist \
              --project-name=expertcont \
              --branch=main
