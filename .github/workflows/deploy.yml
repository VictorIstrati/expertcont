name: Deploy to Cloudflare Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://expertcont.md
    permissions:
      contents: read
      deployments: write
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (secrets injected from Doppler prd)
        run: doppler run --project expertcont --config prd -- pnpm build

      - name: Deploy to Cloudflare Pages
        run: |
          doppler run --project expertcont --config prd -- \
            npx wrangler@3 pages deploy apps/web/dist \
              --project-name=expertcont \
              --branch=main
